apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-operator
  labels:
    app.kubernetes.io/component: operator
    app.kubernetes.io/name: fluent-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-operator
subjects:
- kind: ServiceAccount
  name: fluent-operator
  # Defaults to the install namespace. Kustomize overlays (e.g. config/default)
  # rewrite this to match their `namespace:` setting, so changing the install
  # namespace there is enough — no need to edit this file.
  namespace: fluent
