name: Helm CI

on:
  pull_request:
    branches:
      - 'master'
      - 'release-*'
    paths:
      - ".github/workflows/helm-ci.yaml"
      - "charts/**"
      - "tests/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"

env:
  KUBECTL_VERSION: v1.25.1
  HELM_VERSION: v3.17.2

jobs:
  helm-tests:
    name: helm e2e tests
    runs-on: ubuntu-22.04

    timeout-minutes: 30

    env:
      GO111MODULE: "on"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup kubectl
        uses: marcofranssen/setup-kubectl@8dd250ecabc2b05504337c1ff1ab4766f360742f # v2.1.0
        with:
          kubectlVersion: ${{ env.KUBECTL_VERSION }}

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install dependences
        run: make kind ginkgo setup-test-e2e

      - name: Run helm e2e tests
        run: make fluentd_helm-e2e
